<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wishlist – MelodyNest</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream:#f9f5ef; --ivory:#fdf8f2; --warm-white:#fffdf9;
      --beige:#e8ddd0; --gold:#b89a6a; --gold-light:#d4b896;
      --gold-dark:#8a6f45; --brown:#5c4a35; --charcoal:#2c2c2c;
      --text-muted:#7a6e63; --shadow:rgba(90,70,45,0.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Jost',sans-serif; background:var(--ivory); color:var(--charcoal); }

    nav {
      position:sticky; top:0; z-index:100;
      background:rgba(253,248,242,0.97); backdrop-filter:blur(8px);
      border-bottom:1px solid var(--beige);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 5vw; height:72px; box-shadow:0 2px 16px var(--shadow);
    }
    .nav-logo { font-family:'Cormorant Garamond',serif; font-size:1.7rem; font-weight:600; color:var(--brown); text-decoration:none; }
    .nav-logo span { color:var(--gold); }
    .nav-links { display:flex; gap:2.2rem; list-style:none; }
    .nav-links a { text-decoration:none; font-size:0.82rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); font-weight:500; transition:color 0.25s; }
    .nav-links a:hover,.nav-links a.active { color:var(--gold-dark); }
    .nav-icons { display:flex; gap:1.4rem; }
    .nav-icon { text-decoration:none; font-size:0.82rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); font-weight:500; display:flex; align-items:center; gap:0.4rem; transition:color 0.25s; }
    .nav-icon:hover { color:var(--gold-dark); }
    .badge { background:var(--gold); color:#fff; border-radius:50%; width:18px; height:18px; font-size:0.65rem; display:flex; align-items:center; justify-content:center; font-weight:600; }

    .page-hero { background:linear-gradient(135deg,var(--beige) 0%,var(--cream) 60%); padding:4rem 5vw 3rem; text-align:center; border-bottom:1px solid var(--beige); }
    .page-hero p { font-size:0.7rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); margin-bottom:0.8rem; }
    .page-hero h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,4vw,3rem); font-weight:300; color:var(--brown); }
    .page-hero h1 em { font-style:italic; }

    .wish-main { max-width:1200px; margin:0 auto; padding:3rem 5vw 5rem; }

    /* EMPTY */
    .empty-wish { text-align:center; padding:5rem 2rem; }
    .empty-wish .icon { font-size:4rem; margin-bottom:1.5rem; opacity:0.4; }
    .empty-wish h2 { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:300; font-style:italic; color:var(--brown); margin-bottom:1rem; }
    .empty-wish p { color:var(--text-muted); font-size:0.9rem; margin-bottom:2rem; }
    .btn-primary { display:inline-block; padding:0.95rem 2.8rem; background:var(--gold); color:#fff; font-size:0.78rem; letter-spacing:0.2em; text-transform:uppercase; font-weight:500; text-decoration:none; border:none; cursor:pointer; transition:background 0.3s; font-family:'Jost',sans-serif; }
    .btn-primary:hover { background:var(--gold-dark); }

    /* WISH GRID */
    .wish-toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; }
    .wish-count { font-size:0.82rem; color:var(--text-muted); }
    .btn-clear-all { background:none; border:1px solid var(--beige); color:var(--text-muted); padding:0.5rem 1.2rem; font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; font-family:'Jost',sans-serif; transition:all 0.25s; }
    .btn-clear-all:hover { border-color:var(--gold-dark); color:var(--gold-dark); }

    .wish-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:2rem; }
    .wish-card { background:var(--warm-white); border:1px solid var(--beige); overflow:hidden; transition:box-shadow 0.3s,transform 0.3s; position:relative; }
    .wish-card:hover { box-shadow:0 12px 40px var(--shadow); transform:translateY(-4px); }
    .wish-card-img { position:relative; aspect-ratio:4/3; overflow:hidden; }
    .wish-card-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s; }
    .wish-card:hover .wish-card-img img { transform:scale(1.05); }
    .btn-remove-wish {
      position:absolute; top:10px; right:10px;
      background:rgba(255,255,255,0.92); border:none; color:var(--text-muted);
      width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:1rem;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.25s; box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }
    .btn-remove-wish:hover { background:var(--gold); color:#fff; }
    .wish-card-body { padding:1.4rem 1.6rem 1.6rem; }
    .wish-cat { font-size:0.65rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold); margin-bottom:0.3rem; }
    .wish-name { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:400; color:var(--brown); margin-bottom:0.5rem; }
    .wish-desc { font-size:0.8rem; color:var(--text-muted); line-height:1.6; margin-bottom:0.9rem; }
    .wish-stars { color:var(--gold); font-size:0.8rem; margin-bottom:0.8rem; }
    .wish-footer { display:flex; align-items:center; justify-content:space-between; gap:0.5rem; flex-wrap:wrap; }
    .wish-price { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:600; color:var(--brown); }
    .btn-move { background:var(--gold); color:#fff; border:none; padding:0.55rem 1.1rem; font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; transition:background 0.25s; font-family:'Jost',sans-serif; font-weight:500; }
    .btn-move:hover { background:var(--gold-dark); }

    .wish-actions { margin-top:2.5rem; display:flex; gap:1rem; flex-wrap:wrap; }
    .btn-outline { display:inline-block; padding:0.9rem 2.4rem; background:transparent; color:var(--brown); font-size:0.78rem; letter-spacing:0.2em; text-transform:uppercase; font-weight:500; text-decoration:none; border:1.5px solid var(--gold); cursor:pointer; transition:all 0.3s; font-family:'Jost',sans-serif; }
    .btn-outline:hover { background:var(--gold); color:#fff; }

    /* TOAST */
    .toast { position:fixed; bottom:2rem; right:2rem; z-index:999; background:var(--brown); color:var(--cream); padding:1rem 1.6rem; font-size:0.82rem; box-shadow:0 8px 30px rgba(0,0,0,0.2); transform:translateX(120%); transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); border-left:3px solid var(--gold); }
    .toast.show { transform:translateX(0); }

    footer { background:var(--charcoal); color:rgba(249,245,239,0.35); padding:2rem 5vw; display:flex; justify-content:space-between; font-size:0.75rem; flex-wrap:wrap; gap:1rem; }
    footer a { color:var(--gold-light); text-decoration:none; }

    @media(max-width:600px){ .nav-links,.nav-icons { display:none; } }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Melody<span>Nest</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Products</a></li>
    <li><a href="cart.html">Cart</a></li>
    <li><a href="wishlist.html" class="active">Wishlist</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-icons">
    <a href="cart.html" class="nav-icon">🛒 <span class="badge" id="cartBadge">0</span></a>
    <a href="wishlist.html" class="nav-icon">♡ <span class="badge" id="wishBadge">0</span></a>
  </div>
</nav>

<div class="page-hero">
  <p>Your Saved Pieces</p>
  <h1>My <em>Wishlist</em></h1>
</div>

<div class="wish-main">

  <div class="empty-wish" id="emptyWish" style="display:none">
    <div class="icon">♡</div>
    <h2>Your wishlist is empty</h2>
    <p>Browse our collection and save your favourite instruments for later.</p>
    <a href="products.html" class="btn-primary">Explore Collection</a>
  </div>

  <div id="wishContent">
    <div class="wish-toolbar">
      <p class="wish-count" id="wishCount"></p>
      <button class="btn-clear-all" onclick="clearAll()">Clear All</button>
    </div>
    <div class="wish-grid" id="wishGrid"></div>
    <div class="wish-actions">
      <a href="products.html" class="btn-outline">← Continue Shopping</a>
      <button class="btn-primary" onclick="moveAllToCart()">Move All to Cart</button>
    </div>
  </div>
</div>

<footer>
  <span>© 2025 MelodyNest</span>
  <a href="index.html">← Back to Home</a>
</footer>

<div class="toast" id="toast"></div>

<script>
  let wishlist = JSON.parse(localStorage.getItem('mn_wishlist') || '[]');

  function updateBadges() {
    const cart = JSON.parse(localStorage.getItem('mn_cart') || '[]');
    document.getElementById('cartBadge').textContent = cart.reduce((a,i)=>a+(i.qty||1),0);
    document.getElementById('wishBadge').textContent = wishlist.length;
  }

  function saveWish() {
    localStorage.setItem('mn_wishlist', JSON.stringify(wishlist));
    updateBadges();
  }

  function renderWishlist() {
    updateBadges();
    if (!wishlist.length) {
      document.getElementById('wishContent').style.display = 'none';
      document.getElementById('emptyWish').style.display = 'block';
      return;
    }
    document.getElementById('wishContent').style.display = 'block';
    document.getElementById('emptyWish').style.display = 'none';
    document.getElementById('wishCount').textContent = `${wishlist.length} item${wishlist.length!==1?'s':''} saved`;

    const grid = document.getElementById('wishGrid');
    grid.innerHTML = wishlist.map((item, idx) => `
    <div class="wish-card">
      <div class="wish-card-img">
        <img src="${item.img}" alt="${item.name}" loading="lazy"/>
        <button class="btn-remove-wish" onclick="removeItem(${idx})" title="Remove from wishlist">✕</button>
      </div>
      <div class="wish-card-body">
        <p class="wish-cat">${item.cat}</p>
        <h3 class="wish-name">${item.name}</h3>
        <p class="wish-desc">${item.desc}</p>
        <div class="wish-stars">${'★'.repeat(item.rating)}${'☆'.repeat(5-item.rating)}</div>
        <div class="wish-footer">
          <span class="wish-price">₹${item.price.toLocaleString('en-IN')}</span>
          <button class="btn-move" onclick="moveToCart(${idx})">Move to Cart</button>
        </div>
      </div>
    </div>`).join('');
  }

  function removeItem(idx) {
    wishlist.splice(idx, 1);
    saveWish(); renderWishlist();
    showToast('Removed from wishlist');
  }

  function moveToCart(idx) {
    const item = wishlist[idx];
    const cart = JSON.parse(localStorage.getItem('mn_cart') || '[]');
    const ci = cart.findIndex(i=>i.id===item.id);
    if (ci >= 0) cart[ci].qty = (cart[ci].qty||1) + 1;
    else cart.push({...item, qty:1});
    localStorage.setItem('mn_cart', JSON.stringify(cart));
    wishlist.splice(idx, 1);
    saveWish(); renderWishlist();
    showToast('Moved to cart ✓');
  }

  function moveAllToCart() {
    if (!wishlist.length) return;
    const cart = JSON.parse(localStorage.getItem('mn_cart') || '[]');
    wishlist.forEach(item => {
      const ci = cart.findIndex(i=>i.id===item.id);
      if (ci >= 0) cart[ci].qty = (cart[ci].qty||1) + 1;
      else cart.push({...item, qty:1});
    });
    localStorage.setItem('mn_cart', JSON.stringify(cart));
    wishlist = [];
    saveWish(); renderWishlist();
    showToast('All items moved to cart ✓');
  }

  function clearAll() {
    if (!confirm('Remove all items from wishlist?')) return;
    wishlist = []; saveWish(); renderWishlist();
    showToast('Wishlist cleared');
  }

  function showToast(msg) {
    const t=document.getElementById('toast'); t.textContent=msg;
    t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
  }

  renderWishlist();
</script>
</body>
</html>
